name: Update RoboForex IDs

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and generate txt
        run: |
          node --input-type=module <<'EOF'
          import fs from "fs";

          const url = "https://my.roboforex.com/api/partners/tree?account_id=30281784&api_key=afcca115f0b8e8bd";

          const res = await fetch(url);
          if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);

          const text = await res.text();
          const matches = [...text.matchAll(/account id="(\d+)"/g)];
          const ids = [...new Set(matches.map(x => x[1]))];

          if (ids.length === 0) {
            console.log("No IDs found. Response preview:", text.slice(0, 500));
            process.exit(1);
          }

          const output = `client:\n${ids.join("\n")}`;
          fs.writeFileSync("roboforex.txt", output);
          console.log(`Written ${ids.length} IDs to roboforex.txt`);
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add roboforex.txt
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "update roboforex IDs"
          git push
