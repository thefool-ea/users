<!DOCTYPE html>
<html>
<body>

<pre id="output">Loading...</pre>

<script>
const url =
"https://my.roboforex.com/api/partners/tree?account_id=30281784&api_key=afcca115f0b8e8bd";

fetch("https://corsproxy.io/?" + encodeURIComponent(url))
  .then(r => r.text())
  .then(data => {

    // find all account ids
    const matches = [...data.matchAll(/account id="(\d+)"/g)];

    // remove first main account
    matches.shift();

    // only numbers output
    const ids = matches.map(m => m[1]);

    // display nicely
    document.getElementById("output").textContent =
      "robo ids\n" + ids.join("\n");

  })
  .catch(err => {
    document.getElementById("output").textContent = err;
  });
</script>

</body>
</html>
